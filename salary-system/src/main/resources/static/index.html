<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>企业薪资管理系统 - 工作台</title>
    <script src="/api/vendor/vue.global.js"></script>
    <link rel="stylesheet" href="/api/vendor/element-plus.css" />
    <script src="/api/vendor/element-plus.full.min.js"></script>
    <script src="/api/vendor/element-plus-icons.js"></script>
    <script src="/api/vendor/axios.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: #f0f2f5;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        #app, .el-container { height: 100%; }
        
        /* 侧边栏深色主题 */
        .el-aside {
            background-color: #001529;
            transition: width 0.3s;
            overflow-x: hidden;
            box-shadow: 2px 0 6px rgba(0,21,41,.35);
            z-index: 10;
        }
        .logo-box {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            background-color: #002140;
            overflow: hidden;
            white-space: nowrap;
        }
        .el-menu { border-right: none; }
        
        /* 顶部导航白底 */
        .el-header {
            background-color: #fff;
            color: #333;
            line-height: 60px;
            padding: 0 20px;
            box-shadow: 0 1px 4px rgba(0,21,41,.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 9;
        }
        
        /* 主体内容区 */
        .el-main { padding: 20px; }
        .page-card {
            background: #fff;
            border-radius: 4px;
            padding: 20px;
            min-height: calc(100vh - 140px);
            box-shadow: 0 1px 2px -2px rgba(0,0,0,.16), 0 3px 6px 0 rgba(0,0,0,.12);
        }
        
        /* 交互及动画 */
        .header-left { display: flex; align-items: center; gap: 15px; }
        .collapse-btn { cursor: pointer; font-size: 20px; }
        .user-dropdown { cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 14px;}
        
        .fade-enter-active, .fade-leave-active { transition: opacity 0.2s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
    </style>
</head>
<body>
    <div id="app">
        <el-container>
            <el-aside :width="isCollapse ? '64px' : '220px'">
                <div class="logo-box">
                    <span v-show="!isCollapse">薪资管理系统</span>
                    <el-icon v-show="isCollapse" size="24"><Platform /></el-icon>
                </div>
                <!-- 菜单 -->
                <el-menu
                    :default-active="activeMenu"
                    background-color="#001529"
                    text-color="#a6adb4"
                    active-text-color="#409eff"
                    :collapse="isCollapse"
                    :collapse-transition="false"
                    @select="handleMenuSelect">
                    
                    <el-menu-item index="dashboard">
                        <el-icon><Odometer /></el-icon>
                        <template #title>系统首页</template>
                    </el-menu-item>
                    
                    <el-menu-item index="employee">
                        <el-icon><User /></el-icon>
                        <template #title>员工档案管理</template>
                    </el-menu-item>
                    
                    <el-menu-item index="attendance">
                        <el-icon><Calendar /></el-icon>
                        <template #title>考勤解析处理</template>
                    </el-menu-item>
                    
                    <el-menu-item index="salary">
                        <el-icon><Money /></el-icon>
                        <template #title>薪资核算中心</template>
                    </el-menu-item>
                </el-menu>
            </el-aside>
            
            <el-container>
                <el-header>
                    <div class="header-left">
                        <el-icon class="collapse-btn" @click="isCollapse = !isCollapse">
                            <Expand v-if="isCollapse" />
                            <Fold v-else />
                        </el-icon>
                        <!-- 面包屑 -->
                        <el-breadcrumb separator="/">
                            <el-breadcrumb-item>首页</el-breadcrumb-item>
                            <el-breadcrumb-item>{{ currentTitle }}</el-breadcrumb-item>
                        </el-breadcrumb>
                    </div>
                    
                    <el-dropdown @command="handleCommand">
                        <span class="user-dropdown">
                            <el-avatar size="small" style="background: #409eff;">{{ username.charAt(0) }}</el-avatar>
                            {{ username }}
                            <el-icon><ArrowDown /></el-icon>
                        </span>
                        <template #dropdown>
                            <el-dropdown-menu>
                                <el-dropdown-item command="profile">个人中心</el-dropdown-item>
                                <el-dropdown-item command="logout" divided>退出登录</el-dropdown-item>
                            </el-dropdown-menu>
                        </template>
                    </el-dropdown>
                </el-header>
                
                <el-main>
                    <div class="page-card">
                        <transition name="fade" mode="out-in">
                            <component :is="activeComponent"></component>
                        </transition>
                    </div>
                </el-main>
            </el-container>
        </el-container>
    </div>

    <!-- 动态组件模板 -->
    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        // 全局 Axios 配置及拦截器
        axios.defaults.baseURL = '/api';
        
        axios.interceptors.request.use(config => {
            const token = localStorage.getItem('token');
            if (token) {
                config.headers['Authorization'] = `Bearer ${token}`;
            }
            return config;
        });

        axios.interceptors.response.use(
            response => response, 
            error => {
                const status = error.response ? error.response.status : 0;
                if (status === 401 || status === 403) {
                    ElementPlus.ElMessage.error('登录校验失败或暂无权限，请重新登录');
                    localStorage.removeItem('token');
                    setTimeout(() => window.location.href = 'login.html', 1500);
                } else {
                    ElementPlus.ElMessage.error('服务器或网络异常');
                }
                return Promise.reject(error);
            }
        );

        // 1. 仪表盘 (Dashboard)
        const DashboardView = {
            template: `
                <div>
                    <h2>欢迎回到薪资管理系统</h2>
                    <el-divider></el-divider>
                    <p style="color: #606266; line-height: 1.8;">
                        在这里您可以直观地管理企业员工薪资档案，导入并解析考勤记录表，进行一键自动化的月度薪资核算。
                        <br/><br/>
                        <b>提示：</b> 请在左侧菜单切换对应的功能模块。
                    </p>
                </div>
            `
        };

        // TODO: 其他页面 (由后续步骤动态充填)
        const PlaceholderView = {
            props: ['title'],
            template: `
                <div style="text-align: center; padding-top: 50px;">
                    <el-icon size="60" color="#E6A23C"><Warning /></el-icon>
                    <h2 style="color: #606266; margin-top: 20px;">{{ title }} 模块开发中...</h2>
                </div>
            `
        };

        const app = createApp({
            setup() {
                const isCollapse = ref(false);
                const activeMenu = ref('dashboard');
                const username = ref('System User'); // 演示用，可通过解析 JWT 获取真实姓名
                
                const menuMap = {
                    'dashboard': { title: '系统首页', component: 'DashboardView' },
                    'employee': { title: '员工档案管理', component: 'EmployeeView' },
                    'attendance': { title: '考勤解析处理', component: 'AttendanceView' },
                    'salary': { title: '薪资核算中心', component: 'SalaryView' }
                };

                const currentTitle = computed(() => menuMap[activeMenu.value]?.title);
                const activeComponent = computed(() => {
                    const c = menuMap[activeMenu.value]?.component;
                    // 如果组件未注册，退化为 PlaceholderView
                    return app._context.components[c] ? c : 'PlaceholderView';
                });

                onMounted(() => {
                    const token = localStorage.getItem('token');
                    if (!token) {
                        ElementPlus.ElMessage.warning('权限不足，请先登录');
                        window.location.href = 'login.html';
                        return;
                    }
                    
                    // 简单的 JWT 解码取 username/role (仅前台解析，防君子不防小人，真正鉴权在拦截器及后端)
                    try {
                        const payload = JSON.parse(atob(token.split('.')[1]));
                        if(payload.sub) username.value = payload.sub;
                    } catch (e) { console.error('Token 解析失败'); }
                });

                const handleMenuSelect = (index) => {
                    activeMenu.value = index;
                };

                const handleCommand = (cmd) => {
                    if (cmd === 'logout') {
                        localStorage.removeItem('token');
                        ElementPlus.ElMessage.success('已退出登录');
                        window.location.href = 'login.html';
                    } else if (cmd === 'profile') {
                        ElementPlus.ElMessage.info('个人中心待实现');
                    }
                };

                return {
                    isCollapse,
                    activeMenu,
                    username,
                    currentTitle,
                    activeComponent,
                    handleMenuSelect,
                    handleCommand
                };
            }
        });

        // 注册子组件
        app.component('DashboardView', DashboardView);
        app.component('PlaceholderView', PlaceholderView);

        // 注册所有 Element Plus 图标
        for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
            app.component(key, component);
        }
        
        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
