server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: salary-system
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/bishe?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: salary-system-secret-key-2026-very-long-string-for-hs512-algorithm-must-be-64bytes-min
  expiration: 86400000  # 24小时（毫秒）
  header: Authorization
  token-prefix: "Bearer "

# knife4j 接口文档
knife4j:
  enable: true
  setting:
    language: zh-CN

logging:
  level:
    com.salary.mapper: debug
