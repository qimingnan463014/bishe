interface:
  display_name: "Lunwen"
  short_description: "Write Chinese theses, learn sample-paper structure, manage references, figures, screenshots, and DOCX delivery."
  default_prompt: "Use this skill to write or revise a Chinese thesis or graduation project paper based on real project facts, sample papers, templates, references, figures, screenshots, and DOCX delivery. Before writing, ask for local file paths for template/sample/opening report. If a sample or template is DOCX, run `python tools/analyze_docx.py <sample.docx> --json-out output/style-profile.json`. If a sample is PDF, run `python tools/analyze_sample_pdf.py <sample.pdf> --json-out output/sample-analysis.json`. After analysis, summarize directory, target chapter lengths, and extracted styles, then explicitly wait for user confirmation before writing. During writing, run `python tools/count_chapter_words.py <thesis.md>` to control length, and run `python tools/ensure_thesis_assets.py <thesis.md> --check-only` to verify architecture figure, E-R figure, flow figure, data table, test-case table, and screenshot placeholders exist. When screenshot placeholders exist, use the repository-bundled browser flow: `python tools/extract_screenshot_placeholders.py <thesis.md> --json-out labels.json`, `python tools/build_screenshot_plan.py labels.json output/screenshot-plan.json --base-url <system-url>`, then `python tools/capture_thesis_screenshots.py output/screenshot-plan.json` to produce `image-map.json`. Before DOCX delivery, remove Markdown markers like `**` and links from正文, then generate with `python tools/generate_thesis_docx.py <source.md> <target.docx> --style-profile output/style-profile.json --image-map image-map.json`. Do not silently skip missing images: keep placeholders or warnings in the final DOCX."
